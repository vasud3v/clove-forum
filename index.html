<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/chuglii.svg" />
  <link rel="alternate icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800;900&display=swap"

  <!-- FreeImage.host Upload Plugin -->
  <script async src="https://freeimage.host/js/pup.js" data-url="https://freeimage.host"
    data-auto-insert="markdown-embed" data-palette="default" data-lang="auto"></script>

  <title>Chuglii</title>
  <script>
    // Force light mode by removing dark class
    document.documentElement.classList.remove('dark');
  </script>
</head>

<body>
  <!-- SPA redirect receiver for GitHub Pages -->
  <script>
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location))
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

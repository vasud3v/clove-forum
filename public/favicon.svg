<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Neo-Brutalist Favicon: Bold geometric grid design -->
  
  <!-- Main black border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#000000" stroke-width="4"/>
  
  <!-- Inner white background -->
  <rect x="6" y="6" width="52" height="52" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  
  <!-- Grid structure - brutalist geometric blocks -->
  <g stroke="#000000" stroke-width="2" fill="none">
    <!-- Vertical lines -->
    <line x1="22" y1="10" x2="22" y2="54" />
    <line x1="42" y1="10" x2="42" y2="54" />
    <!-- Horizontal lines -->
    <line x1="10" y1="22" x2="54" y2="22" />
    <line x1="10" y1="42" x2="54" y2="42" />
  </g>
  
  <!-- Center brutalist block - hot pink -->
  <rect x="26" y="26" width="12" height="12" fill="#ff2d92" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Corner accent marks -->
  <g fill="#000000">
    <rect x="12" y="12" width="2" height="2" />
    <rect x="50" y="12" width="2" height="2" />
    <rect x="12" y="50" width="2" height="2" />
    <rect x="50" y="50" width="2" height="2" />
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Neo-Brutalism Clove Logo: Bold geometric grid design -->
  
  <!-- Main border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#000000" stroke-width="3"/>
  
  <!-- Inner frame -->
  <rect x="6" y="6" width="52" height="52" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  
  <!-- Grid lines -->
  <g stroke="#000000" stroke-width="1.5" fill="none" stroke-dasharray="2,2">
    <line x1="20" y1="10" x2="20" y2="54" />
    <line x1="44" y1="10" x2="44" y2="54" />
    <line x1="10" y1="24" x2="54" y2="24" />
    <line x1="10" y1="40" x2="54" y2="40" />
  </g>
  
  <!-- Three petal arrangement - geometric blocks -->
  <!-- Top petal -->
  <rect x="26" y="10" width="12" height="14" fill="#ff2d92" stroke="#000000" stroke-width="2"/>
  
  <!-- Bottom-left petal -->
  <rect x="10" y="38" width="12" height="14" fill="#ff2d92" stroke="#000000" stroke-width="2"/>
  
  <!-- Bottom-right petal -->
  <rect x="42" y="38" width="12" height="14" fill="#ff2d92" stroke="#000000" stroke-width="2"/>
  
  <!-- Center circle - hot pink -->
  <circle cx="32" cy="32" r="6" fill="#ff2d92" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Corner accents -->
  <g fill="#000000">
    <rect x="12" y="12" width="2" height="2" />
    <rect x="50" y="12" width="2" height="2" />
    <rect x="12" y="50" width="2" height="2" />
    <rect x="50" y="50" width="2" height="2" />
  </g>
</svg>

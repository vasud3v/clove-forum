<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Clove Forum</title>
  <script>
    // SPA redirect for GitHub Pages
    // When GitHub Pages encounters a 404, it serves this page.
    // This script redirects the path to the main index.html with a query parameter,
    // which the app then reads and navigates to the correct route.
    var pathSegmentsToKeep = 1; // Keep 1 segment for repo name (e.g., /clove-forum/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
